<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYCORE - Patrones en la Secuencia</title>
<style>
  :root{
    --bg-1:#0a0e27;
    --bg-2:#1a1f3a;
    --accent:#7ee0d8;
    --accent-dim:#4a8f8a;
    --ok:#4ade80;
    --bad:#f87171;
    --card-bg:#161b36;
    --card-border:#2a3160;
    --text:#e8ecff;
    --text-dim:#8b93c4;
    --shape-red:#f87171;
    --shape-blue:#5aa9ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 100%);
    color:var(--text);
    overflow:hidden;
    user-select:none;
  }
  #game{
    width:100%;height:100%;
    display:flex;flex-direction:column;
    align-items:center;
    padding:16px 20px 20px;
    position:relative;
  }

  /* ---------- HEADER ---------- */
  #header{
    width:100%;
    max-width:780px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  #title-block h1{
    font-size:20px;
    letter-spacing:2px;
    color:var(--accent);
    font-weight:700;
  }
  #title-block p{
    font-size:12px;
    color:var(--text-dim);
    margin-top:2px;
  }
  #timer-box{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(126,224,216,0.08);
    border:1px solid var(--card-border);
    border-radius:10px;
    padding:8px 16px;
  }
  #timer-icon{
    width:16px;height:16px;
    border:2px solid var(--accent);
    border-radius:50%;
    position:relative;
  }
  #timer-icon::after{
    content:'';
    position:absolute;
    top:1px;left:50%;
    width:1.5px;height:6px;
    background:var(--accent);
  }
  #timer{
    font-size:20px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:1px;
    font-variant-numeric:tabular-nums;
  }
  #timer.warning{
    color:var(--bad);
    animation:blink 0.6s infinite;
  }
  @keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
  }

  /* ---------- PROGRESS ---------- */
  #progress-wrap{
    width:100%;
    max-width:780px;
    margin-bottom:16px;
  }
  #progress-label{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  #progress-track{
    width:100%;
    height:6px;
    background:var(--card-border);
    border-radius:4px;
    overflow:hidden;
  }
  #progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent-dim),var(--accent));
    transition:width .3s ease;
  }

  /* ---------- ROUND CARD ---------- */
  #round-card{
    width:100%;
    max-width:780px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:14px;
    padding:26px 26px 24px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }

  #round-tag{
    display:inline-block;
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
    border:1px solid var(--accent-dim);
    border-radius:20px;
    padding:4px 12px;
    margin-bottom:16px;
  }

  #prompt-text{
    font-size:13.5px;
    color:var(--text-dim);
    margin-bottom:18px;
    line-height:1.4;
  }

  /* ---------- SEQUENCE DISPLAY ---------- */
  #sequence-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-bottom:26px;
    flex-wrap:wrap;
  }
  .seq-item{
    width:78px;
    height:78px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(126,224,216,0.05);
    border:1px solid var(--card-border);
    border-radius:12px;
    flex-shrink:0;
  }
  .seq-item.question{
    border:2px dashed var(--accent);
    background:rgba(126,224,216,0.08);
  }
  .seq-number, .seq-letter{
    font-size:28px;
    font-weight:700;
    color:var(--text);
  }
  .seq-question-mark{
    font-size:30px;
    font-weight:700;
    color:var(--accent);
  }
  .seq-arrow{
    color:var(--text-dim);
    font-size:16px;
    flex-shrink:0;
  }
  .seq-shape{
    width:38px;
    height:38px;
  }
  .seq-shape.circle{
    border-radius:50%;
  }
  .seq-shape.square{
    border-radius:6px;
  }
  .seq-shape.triangle{
    width:0;
    height:0;
    background:none !important;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-bottom:34px solid;
  }

  /* ---------- OPTIONS ---------- */
  #options-label{
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:10px;
  }
  #options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .option-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:rgba(255,255,255,0.02);
    border:1.5px solid var(--card-border);
    border-radius:10px;
    padding:16px;
    cursor:pointer;
    transition:border-color .15s, background .15s, transform .1s;
    font-family:inherit;
  }
  .option-btn:hover:not(:disabled){
    border-color:var(--accent-dim);
    background:rgba(126,224,216,0.05);
    transform:translateY(-1px);
  }
  .option-btn:disabled{ cursor:default; }
  .option-btn .opt-number, .option-btn .opt-letter{
    font-size:20px;
    font-weight:700;
    color:var(--text);
  }
  .option-btn .opt-shape{
    width:30px;
    height:30px;
  }
  .option-btn .opt-shape.circle{ border-radius:50%; }
  .option-btn .opt-shape.square{ border-radius:6px; }

  .option-btn.correct{
    border-color:var(--ok);
    background:rgba(74,222,128,0.1);
  }
  .option-btn.correct .opt-number,
  .option-btn.correct .opt-letter{ color:var(--ok); }
  .option-btn.incorrect{
    border-color:var(--bad);
    background:rgba(248,113,113,0.1);
  }
  .option-btn.incorrect .opt-number,
  .option-btn.incorrect .opt-letter{ color:var(--bad); }
  .option-btn.dimmed{
    opacity:0.4;
  }

  #feedback-box{
    margin-top:18px;
    padding:12px 14px;
    border-radius:8px;
    font-size:12.5px;
    line-height:1.5;
    display:none;
  }
  #feedback-box.show{display:block;}
  #feedback-box.correct-fb{
    background:rgba(74,222,128,0.08);
    border:1px solid var(--ok);
    color:#c9f7d9;
  }
  #feedback-box.incorrect-fb{
    background:rgba(248,113,113,0.08);
    border:1px solid var(--bad);
    color:#fbd0d0;
  }

  #next-btn{
    margin-top:18px;
    width:100%;
    background:linear-gradient(135deg,var(--accent),var(--accent-dim));
    color:var(--bg-1);
    border:none;
    padding:13px;
    border-radius:8px;
    font-size:13.5px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    display:none;
    transition:transform .15s, box-shadow .15s;
  }
  #next-btn.show{display:block;}
  #next-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(126,224,216,0.35);
  }

  /* ---------- RESULT SCREEN ---------- */
  #result-screen{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 100%);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
  }
  #result-screen.show{display:flex;}
  #result-shape{
    width:90px;height:90px;
    border:3px solid var(--accent);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:22px;
    position:relative;
  }
  #result-shape::before{
    content:'';
    width:36px;height:36px;
    border:3px solid var(--accent);
    transform:rotate(45deg);
  }
  #result-title{
    font-size:24px;
    color:var(--accent);
    letter-spacing:2px;
    margin-bottom:8px;
    font-weight:700;
  }
  #result-sub{
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:22px;
    max-width:420px;
    line-height:1.5;
  }
  #result-stats{
    display:flex;
    gap:20px;
    margin-bottom:22px;
  }
  .stat{
    background:rgba(126,224,216,0.06);
    border:1px solid var(--card-border);
    border-radius:10px;
    padding:10px 18px;
  }
  .stat-value{
    font-size:20px;
    font-weight:700;
    color:var(--accent);
  }
  .stat-label{
    font-size:9.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-top:2px;
  }
  #score-box{
    background:rgba(126,224,216,0.06);
    border:1px solid var(--card-border);
    border-radius:12px;
    padding:22px 50px;
    margin-bottom:30px;
  }
  #score-value{
    font-size:46px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:1px;
  }
  #score-max{
    font-size:16px;
    color:var(--text-dim);
  }
  #score-label{
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-top:4px;
  }
  #continue-btn{
    background:linear-gradient(135deg,var(--accent),var(--accent-dim));
    color:var(--bg-1);
    border:none;
    padding:14px 48px;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(126,224,216,0.25);
    transition:transform .15s, box-shadow .15s;
  }
  #continue-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 22px rgba(126,224,216,0.4);
  }

  @media (max-width:520px){
    .seq-item{width:56px;height:56px;}
    .seq-number,.seq-letter{font-size:20px;}
    #options-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="game">

  <div id="header">
    <div id="title-block">
      <h1>PYCORE</h1>
      <p>Módulo · Reconocimiento de Patrones</p>
    </div>
    <div id="timer-box">
      <div id="timer-icon"></div>
      <div id="timer">02:00</div>
    </div>
  </div>

  <div id="progress-wrap">
    <div id="progress-label">
      <span id="progress-current">Ronda 1 de 5</span>
      <span id="progress-score">0 pts</span>
    </div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="round-card">
    <div id="round-tag">Patrón</div>
    <div id="prompt-text">Detectas una secuencia de errores en el sistema. Descubre el patrón y predice el siguiente elemento.</div>

    <div id="sequence-row"></div>

    <div id="options-label">¿Cuál es el siguiente elemento?</div>
    <div id="options-grid"></div>

    <div id="feedback-box"></div>
    <button id="next-btn">Siguiente</button>
  </div>

  <div id="result-screen">
    <div id="result-shape"></div>
    <div id="result-title">PATRONES RESUELTOS</div>
    <div id="result-sub" id="result-sub-text"></div>
    <div id="result-stats">
      <div class="stat">
        <div class="stat-value" id="stat-correct">0/5</div>
        <div class="stat-label">Correctas</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-time">00:00</div>
        <div class="stat-label">Tiempo usado</div>
      </div>
    </div>
    <div id="score-box">
      <span id="score-value">0</span><span id="score-max"> / 40</span>
      <div id="score-label">Puntos obtenidos</div>
    </div>
    <button id="continue-btn">Continuar</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---------- DATA ----------
  // type: 'number' | 'letter' | 'shape'
  const rounds = [
    {
      type: 'number',
      tag: 'Patrón aritmético',
      sequence: [2,4,6,8],
      answer: 10,
      options: [10, 9, 12, 14],
      explanation: 'El patrón suma 2 en cada paso: 2, 4, 6, 8, 10.'
    },
    {
      type: 'shape',
      tag: 'Patrón de alternancia',
      sequence: [
        {shape:'circle', color:'var(--shape-red)'},
        {shape:'square', color:'var(--shape-blue)'},
        {shape:'circle', color:'var(--shape-red)'},
        {shape:'square', color:'var(--shape-blue)'}
      ],
      answer: {shape:'circle', color:'var(--shape-red)'},
      options: [
        {shape:'circle', color:'var(--shape-red)'},
        {shape:'square', color:'var(--shape-blue)'},
        {shape:'circle', color:'var(--shape-blue)'},
        {shape:'square', color:'var(--shape-red)'}
      ],
      explanation: 'La secuencia alterna entre círculo rojo y cuadrado azul, así que el siguiente vuelve a ser círculo rojo.'
    },
    {
      type: 'number',
      tag: 'Patrón geométrico',
      sequence: [1,2,4,8],
      answer: 16,
      options: [16, 12, 10, 32],
      explanation: 'Cada número se multiplica por 2: 1, 2, 4, 8, 16.'
    },
    {
      type: 'letter',
      tag: 'Patrón de saltos',
      sequence: ['A','C','E','G'],
      answer: 'I',
      options: ['I', 'H', 'J', 'F'],
      explanation: 'La secuencia salta una letra cada vez: A, C, E, G, I.'
    },
    {
      type: 'number',
      tag: 'Patrón acumulativo',
      sequence: [1,1,2,3,5],
      answer: 8,
      options: [8, 7, 9, 13],
      explanation: 'Cada número es la suma de los dos anteriores (secuencia de Fibonacci): 1, 1, 2, 3, 5, 8.'
    }
  ];

  const TOTAL_TIME = 120; // 2:00
  const POINTS_PER_CORRECT = 8;
  const MAX_SCORE = 40;

  let currentIndex = 0;
  let correctCount = 0;
  let score = 0;
  let answered = false;
  let timeLeft = TOTAL_TIME;
  let timerInterval = null;
  let finished = false;

  // ---------- DOM REFS ----------
  const timerEl = document.getElementById('timer');
  const progressCurrent = document.getElementById('progress-current');
  const progressScore = document.getElementById('progress-score');
  const progressFill = document.getElementById('progress-fill');
  const roundTag = document.getElementById('round-tag');
  const sequenceRow = document.getElementById('sequence-row');
  const optionsGrid = document.getElementById('options-grid');
  const feedbackBox = document.getElementById('feedback-box');
  const nextBtn = document.getElementById('next-btn');

  function formatTime(t){
    const m = Math.floor(t/60).toString().padStart(2,'0');
    const s = (t%60).toString().padStart(2,'0');
    return m + ':' + s;
  }

  function startTimer(){
    timerEl.textContent = formatTime(timeLeft);
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = formatTime(timeLeft);
      if(timeLeft <= 20){
        timerEl.classList.add('warning');
      }
      if(timeLeft <= 0){
        clearInterval(timerInterval);
        timeLeft = 0;
        onTimeUp();
      }
    }, 1000);
  }

  function onTimeUp(){
    if(finished) return;
    finished = true;
    finishGame(true);
  }

  // ---------- RENDER HELPERS ----------
  function makeItemEl(round, value, isQuestionSlot){
    const el = document.createElement('div');
    el.className = 'seq-item' + (isQuestionSlot ? ' question' : '');

    if(isQuestionSlot){
      const q = document.createElement('span');
      q.className = 'seq-question-mark';
      q.textContent = '?';
      el.appendChild(q);
      return el;
    }

    if(round.type === 'number'){
      const span = document.createElement('span');
      span.className = 'seq-number';
      span.textContent = value;
      el.appendChild(span);
    } else if(round.type === 'letter'){
      const span = document.createElement('span');
      span.className = 'seq-letter';
      span.textContent = value;
      el.appendChild(span);
    } else if(round.type === 'shape'){
      const shapeEl = document.createElement('div');
      shapeEl.className = 'seq-shape ' + value.shape;
      shapeEl.style.background = value.shape === 'triangle' ? 'none' : value.color;
      if(value.shape === 'triangle'){
        shapeEl.style.borderBottomColor = value.color;
      }
      el.appendChild(shapeEl);
    }
    return el;
  }

  function makeOptionContentEl(round, value){
    if(round.type === 'number'){
      const span = document.createElement('span');
      span.className = 'opt-number';
      span.textContent = value;
      return span;
    } else if(round.type === 'letter'){
      const span = document.createElement('span');
      span.className = 'opt-letter';
      span.textContent = value;
      return span;
    } else {
      const shapeEl = document.createElement('div');
      shapeEl.className = 'opt-shape ' + value.shape;
      shapeEl.style.background = value.color;
      return shapeEl;
    }
  }

  function optionsEqual(round, a, b){
    if(round.type === 'shape'){
      return a.shape === b.shape && a.color === b.color;
    }
    return a === b;
  }

  function renderRound(){
    answered = false;
    const round = rounds[currentIndex];

    roundTag.textContent = round.tag;
    progressCurrent.textContent = 'Ronda ' + (currentIndex + 1) + ' de ' + rounds.length;
    progressScore.textContent = score + ' pts';
    progressFill.style.width = (currentIndex / rounds.length * 100) + '%';

    feedbackBox.className = '';
    feedbackBox.textContent = '';
    nextBtn.classList.remove('show');

    // sequence
    sequenceRow.innerHTML = '';
    round.sequence.forEach((val, idx) => {
      sequenceRow.appendChild(makeItemEl(round, val, false));
      const arrow = document.createElement('span');
      arrow.className = 'seq-arrow';
      arrow.textContent = '→';
      sequenceRow.appendChild(arrow);
    });
    sequenceRow.appendChild(makeItemEl(round, null, true));

    // options
    optionsGrid.innerHTML = '';
    round.options.forEach((opt) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.type = 'button';
      btn.appendChild(makeOptionContentEl(round, opt));
      btn.addEventListener('click', () => handleAnswer(round, opt, btn));
      optionsGrid.appendChild(btn);
    });
  }

  function handleAnswer(round, selectedValue, btnEl){
    if(answered || finished) return;
    answered = true;

    const isCorrect = optionsEqual(round, selectedValue, round.answer);
    const allButtons = Array.from(optionsGrid.children);

    allButtons.forEach((btn, idx) => {
      btn.disabled = true;
      const optVal = round.options[idx];
      const isThisCorrect = optionsEqual(round, optVal, round.answer);
      if(isThisCorrect){
        btn.classList.add('correct');
      } else if(btn === btnEl && !isCorrect){
        btn.classList.add('incorrect');
      } else {
        btn.classList.add('dimmed');
      }
    });

    if(isCorrect){
      correctCount++;
      score += POINTS_PER_CORRECT;
      feedbackBox.className = 'show correct-fb';
      feedbackBox.textContent = '✓ Correcto. ' + round.explanation;
    } else {
      feedbackBox.className = 'show incorrect-fb';
      feedbackBox.textContent = '✗ No es el patrón. ' + round.explanation;
    }

    progressScore.textContent = score + ' pts';
    nextBtn.textContent = (currentIndex === rounds.length - 1) ? 'Ver resultado' : 'Siguiente';
    nextBtn.classList.add('show');
  }

  nextBtn.addEventListener('click', () => {
    if(finished) return;
    if(currentIndex < rounds.length - 1){
      currentIndex++;
      renderRound();
    } else {
      progressFill.style.width = '100%';
      finished = true;
      finishGame(false);
    }
  });

  // ---------- RESULT ----------
  const resultScreen = document.getElementById('result-screen');
  const resultTitle = document.getElementById('result-title');
  const resultSub = document.getElementById('result-sub-text');
  const statCorrect = document.getElementById('stat-correct');
  const statTime = document.getElementById('stat-time');
  const scoreValue = document.getElementById('score-value');
  const continueBtn = document.getElementById('continue-btn');

  function finishGame(timeExpired){
    clearInterval(timerInterval);

    const finalScore = Math.min(score, MAX_SCORE);
    const timeUsed = TOTAL_TIME - timeLeft;

    if(correctCount === rounds.length){
      resultTitle.textContent = 'PATRONES RESUELTOS';
      resultSub.textContent = 'Identificaste cada patrón de error del sistema con precisión. ¡Reconocimiento perfecto!';
    } else if(timeExpired){
      resultTitle.textContent = 'TIEMPO AGOTADO';
      resultSub.textContent = 'Se acabó el tiempo. Identificaste correctamente ' + correctCount + ' de ' + rounds.length + ' patrones.';
    } else if(correctCount >= rounds.length / 2){
      resultTitle.textContent = 'BUEN RECONOCIMIENTO';
      resultSub.textContent = 'Identificaste correctamente ' + correctCount + ' de ' + rounds.length + ' patrones.';
    } else {
      resultTitle.textContent = 'PATRONES INCOMPLETOS';
      resultSub.textContent = 'Conviene repasar cómo identificar patrones numéricos y visuales. Acertaste ' + correctCount + ' de ' + rounds.length + '.';
    }

    statCorrect.textContent = correctCount + '/' + rounds.length;
    statTime.textContent = formatTime(timeUsed);
    scoreValue.textContent = finalScore;

    resultScreen.classList.add('show');

    // Enviar resultado a Unity
    if (window.parent.unityInstance) {
      try {
        window.parent.unityInstance.SendMessage('MinijuegoManager', 'RecibirResultadoMinijuego', String(finalScore));
      } catch (e) {}
    }
  }

  continueBtn.addEventListener('click', () => {
    if (window.parent.unityInstance) {
      try {
        window.parent.unityInstance.SendMessage('MinijuegoManager', 'CerrarMinijuego', '');
      } catch (e) {}
    }
  });

  // ---------- INIT ----------
  function init(){
    renderRound();
