<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYCORE - El Subproblema Oculto</title>
<style>
  :root{
    --bg-1:#0a0e27;
    --bg-2:#1a1f3a;
    --accent:#7ee0d8;
    --accent-dim:#4a8f8a;
    --ok:#4ade80;
    --bad:#f87171;
    --card-bg:#161b36;
    --card-border:#2a3160;
    --text:#e8ecff;
    --text-dim:#8b93c4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 100%);
    color:var(--text);
    overflow:hidden;
    user-select:none;
  }
  #game{
    width:100%;height:100%;
    display:flex;flex-direction:column;
    align-items:center;
    padding:16px 20px 20px;
    position:relative;
  }

  /* ---------- HEADER ---------- */
  #header{
    width:100%;
    max-width:720px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  #title-block h1{
    font-size:20px;
    letter-spacing:2px;
    color:var(--accent);
    font-weight:700;
  }
  #title-block p{
    font-size:12px;
    color:var(--text-dim);
    margin-top:2px;
  }
  #elapsed-box{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(126,224,216,0.08);
    border:1px solid var(--card-border);
    border-radius:10px;
    padding:8px 16px;
  }
  #elapsed-icon{
    width:16px;height:16px;
    border:2px solid var(--accent);
    border-radius:50%;
    position:relative;
  }
  #elapsed-icon::after{
    content:'';
    position:absolute;
    top:1px;left:50%;
    width:1.5px;height:6px;
    background:var(--accent);
  }
  #elapsed{
    font-size:18px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:1px;
    font-variant-numeric:tabular-nums;
  }

  /* ---------- PROGRESS ---------- */
  #progress-wrap{
    width:100%;
    max-width:720px;
    margin-bottom:16px;
  }
  #progress-label{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  #progress-track{
    width:100%;
    height:6px;
    background:var(--card-border);
    border-radius:4px;
    overflow:hidden;
  }
  #progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent-dim),var(--accent));
    transition:width .3s ease;
  }

  /* ---------- QUIZ CARD ---------- */
  #quiz-card{
    width:100%;
    max-width:720px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:14px;
    padding:26px 26px 22px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }

  #scenario-tag{
    display:inline-block;
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
    border:1px solid var(--accent-dim);
    border-radius:20px;
    padding:4px 12px;
    margin-bottom:14px;
  }

  #question-text{
    font-size:17px;
    line-height:1.5;
    color:var(--text);
    margin-bottom:22px;
    font-weight:600;
  }

  #options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .option-btn{
    display:flex;
    align-items:center;
    gap:12px;
    background:rgba(255,255,255,0.02);
    border:1.5px solid var(--card-border);
    border-radius:10px;
    padding:14px 16px;
    font-size:13.5px;
    color:var(--text);
    text-align:left;
    cursor:pointer;
    transition:border-color .15s, background .15s, transform .1s;
    font-family:inherit;
  }
  .option-btn:hover:not(:disabled){
    border-color:var(--accent-dim);
    background:rgba(126,224,216,0.05);
    transform:translateY(-1px);
  }
  .option-btn:disabled{
    cursor:default;
  }
  .option-letter{
    width:26px;height:26px;
    flex-shrink:0;
    border:1.5px solid var(--accent-dim);
    border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;
    font-weight:700;
    color:var(--accent);
  }
  .option-btn.correct{
    border-color:var(--ok);
    background:rgba(74,222,128,0.1);
  }
  .option-btn.correct .option-letter{
    border-color:var(--ok);
    color:var(--ok);
    background:rgba(74,222,128,0.15);
  }
  .option-btn.incorrect{
    border-color:var(--bad);
    background:rgba(248,113,113,0.1);
  }
  .option-btn.incorrect .option-letter{
    border-color:var(--bad);
    color:var(--bad);
    background:rgba(248,113,113,0.15);
  }
  .option-btn.dimmed{
    opacity:0.45;
  }

  #feedback-box{
    margin-top:18px;
    padding:12px 14px;
    border-radius:8px;
    font-size:12.5px;
    line-height:1.5;
    display:none;
  }
  #feedback-box.show{display:block;}
  #feedback-box.correct-fb{
    background:rgba(74,222,128,0.08);
    border:1px solid var(--ok);
    color:#c9f7d9;
  }
  #feedback-box.incorrect-fb{
    background:rgba(248,113,113,0.08);
    border:1px solid var(--bad);
    color:#fbd0d0;
  }

  #next-btn{
    margin-top:18px;
    width:100%;
    background:linear-gradient(135deg,var(--accent),var(--accent-dim));
    color:var(--bg-1);
    border:none;
    padding:13px;
    border-radius:8px;
    font-size:13.5px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    display:none;
    transition:transform .15s, box-shadow .15s;
  }
  #next-btn.show{display:block;}
  #next-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(126,224,216,0.35);
  }

  /* ---------- RESULT SCREEN ---------- */
  #result-screen{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 100%);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
  }
  #result-screen.show{display:flex;}
  #result-shape{
    width:90px;height:90px;
    border:3px solid var(--accent);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:22px;
    position:relative;
  }
  #result-shape::before{
    content:'';
    width:36px;height:36px;
    border:3px solid var(--accent);
    transform:rotate(45deg);
  }
  #result-title{
    font-size:24px;
    color:var(--accent);
    letter-spacing:2px;
    margin-bottom:8px;
    font-weight:700;
  }
  #result-sub{
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:22px;
    max-width:420px;
    line-height:1.5;
  }
  #result-stats{
    display:flex;
    gap:20px;
    margin-bottom:22px;
  }
  .stat{
    background:rgba(126,224,216,0.06);
    border:1px solid var(--card-border);
    border-radius:10px;
    padding:10px 18px;
  }
  .stat-value{
    font-size:20px;
    font-weight:700;
    color:var(--accent);
  }
  .stat-label{
    font-size:9.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-top:2px;
  }
  #score-box{
    background:rgba(126,224,216,0.06);
    border:1px solid var(--card-border);
    border-radius:12px;
    padding:22px 50px;
    margin-bottom:30px;
  }
  #score-value{
    font-size:46px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:1px;
  }
  #score-max{
    font-size:16px;
    color:var(--text-dim);
  }
  #score-label{
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-top:4px;
  }
  #continue-btn{
    background:linear-gradient(135deg,var(--accent),var(--accent-dim));
    color:var(--bg-1);
    border:none;
    padding:14px 48px;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(126,224,216,0.25);
    transition:transform .15s, box-shadow .15s;
  }
  #continue-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 22px rgba(126,224,216,0.4);
  }
</style>
</head>
<body>

<div id="game">

  <div id="header">
    <div id="title-block">
      <h1>PYCORE</h1>
      <p>Módulo · El Subproblema Oculto</p>
    </div>
    <div id="elapsed-box">
      <div id="elapsed-icon"></div>
      <div id="elapsed">00:00</div>
    </div>
  </div>

  <div id="progress-wrap">
    <div id="progress-label">
      <span id="progress-current">Pregunta 1 de 5</span>
      <span id="progress-score">0 pts</span>
    </div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="quiz-card">
    <div id="scenario-tag">Escenario</div>
    <div id="question-text"></div>
    <div id="options"></div>
    <div id="feedback-box"></div>
    <button id="next-btn">Siguiente</button>
  </div>

  <div id="result-screen">
    <div id="result-shape"></div>
    <div id="result-title">ANÁLISIS COMPLETO</div>
    <div id="result-sub" id="result-sub-text"></div>
    <div id="result-stats">
      <div class="stat">
        <div class="stat-value" id="stat-correct">0/5</div>
        <div class="stat-label">Correctas</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-time">00:00</div>
        <div class="stat-label">Tiempo</div>
      </div>
    </div>
    <div id="score-box">
      <span id="score-value">0</span><span id="score-max"> / 40</span>
      <div id="score-label">Puntos obtenidos</div>
    </div>
    <button id="continue-btn">Continuar</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---------- DATA ----------
  const questions = [
    {
      scenario: "Escenario 1",
      text: "Ya sabes que la fuente de poder falló. ¿Cuál es el subproblema lógico siguiente?",
      options: [
        "Verificar si hay una fuente de repuesto disponible",
        "Reinstalar el sistema operativo",
        "Actualizar los drivers de la tarjeta gráfica",
        "Cambiar la contraseña de usuario"
      ],
      correct: 0,
      explanation: "Una vez identificada la causa, el siguiente subproblema lógico es resolverla: buscar el reemplazo necesario."
    },
    {
      scenario: "Escenario 2",
      text: "Si un problema grande no se puede resolver de una vez, ¿qué se debe hacer primero?",
      options: [
        "Ignorar las partes más difíciles",
        "Dividirlo en partes más pequeñas y manejables",
        "Resolverlo por ensayo y error sin planificación",
        "Esperar a que alguien más lo resuelva"
      ],
      correct: 1,
      explanation: "La descomposición consiste en dividir un problema grande en partes pequeñas que se puedan resolver por separado."
    },
    {
      scenario: "Escenario 3",
      text: "¿Cuál de estas NO es una subtarea válida de 'reparar la PC'?",
      options: [
        "Revisar la fuente de poder",
        "Verificar la memoria RAM",
        "Diseñar el logo de la empresa",
        "Probar los periféricos"
      ],
      correct: 2,
      explanation: "Diseñar un logo no tiene relación lógica con el problema de reparar una PC; no es una subtarea derivada de él."
    },
    {
      scenario: "Escenario 4",
      text: "Al descomponer un problema, ¿por qué es importante identificar el orden de las subtareas?",
      options: [
        "Porque algunas subtareas dependen de que otras se completen primero",
        "Porque el orden no afecta el resultado final",
        "Porque así el problema se ve más complicado",
        "Porque las computadoras solo entienden un orden fijo"
      ],
      correct: 0,
      explanation: "Muchas subtareas tienen dependencias: revisar la RAM no tiene sentido si antes no se confirmó que la PC enciende."
    },
    {
      scenario: "Escenario 5",
      text: "Dividiste 'reparar la PC' en Diagnóstico, Reparación y Verificación. ¿Qué elemento conecta estas tres fases entre sí?",
      options: [
        "El resultado de una fase determina si se pasa a la siguiente",
        "Las fases son totalmente independientes y no se relacionan",
        "Solo importa la fase final, no las anteriores",
        "Cada fase debe repetirse infinitamente sin avanzar"
      ],
      correct: 0,
      explanation: "El subproblema oculto que conecta todo es la dependencia entre fases: cada una se apoya en el resultado de la anterior."
    }
  ];

  const POINTS_PER_CORRECT = 8;
  const MAX_SCORE = 40;

  let currentIndex = 0;
  let correctCount = 0;
  let score = 0;
  let answered = false;
  let elapsedSeconds = 0;
  let timerInterval = null;
  let finished = false;

  // ---------- DOM REFS ----------
  const elapsedEl = document.getElementById('elapsed');
  const progressCurrent = document.getElementById('progress-current');
  const progressScore = document.getElementById('progress-score');
  const progressFill = document.getElementById('progress-fill');
  const scenarioTag = document.getElementById('scenario-tag');
  const questionText = document.getElementById('question-text');
  const optionsEl = document.getElementById('options');
  const feedbackBox = document.getElementById('feedback-box');
  const nextBtn = document.getElementById('next-btn');

  const letters = ['A','B','C','D'];

  function formatTime(t){
    const m = Math.floor(t/60).toString().padStart(2,'0');
    const s = (t%60).toString().padStart(2,'0');
    return m + ':' + s;
  }

  function startElapsedTimer(){
    elapsedEl.textContent = formatTime(elapsedSeconds);
    timerInterval = setInterval(() => {
      elapsedSeconds++;
      elapsedEl.textContent = formatTime(elapsedSeconds);
    }, 1000);
  }

  function renderQuestion(){
    answered = false;
    const q = questions[currentIndex];

    scenarioTag.textContent = q.scenario;
    questionText.textContent = q.text;
    progressCurrent.textContent = 'Pregunta ' + (currentIndex + 1) + ' de ' + questions.length;
    progressScore.textContent = score + ' pts';
    progressFill.style.width = ((currentIndex) / questions.length * 100) + '%';

    feedbackBox.className = '';
    feedbackBox.textContent = '';
    nextBtn.classList.remove('show');

    optionsEl.innerHTML = '';
    q.options.forEach((optText, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.type = 'button';

      const letterSpan = document.createElement('span');
      letterSpan.className = 'option-letter';
      letterSpan.textContent = letters[idx];

      const textSpan = document.createElement('span');
      textSpan.textContent = optText;

      btn.appendChild(letterSpan);
      btn.appendChild(textSpan);

      btn.addEventListener('click', () => handleAnswer(idx, btn));
      optionsEl.appendChild(btn);
    });
  }

  function handleAnswer(selectedIdx, btnEl){
    if(answered || finished) return;
    answered = true;

    const q = questions[currentIndex];
    const isCorrect = selectedIdx === q.correct;
    const allButtons = Array.from(optionsEl.children);

    allButtons.forEach((btn, idx) => {
      btn.disabled = true;
      if(idx === q.correct){
        btn.classList.add('correct');
      } else if(idx === selectedIdx && !isCorrect){
        btn.classList.add('incorrect');
      } else {
        btn.classList.add('dimmed');
      }
    });

    if(isCorrect){
      correctCount++;
      score += POINTS_PER_CORRECT;
      feedbackBox.className = 'show correct-fb';
      feedbackBox.textContent = '✓ Correcto. ' + q.explanation;
    } else {
      feedbackBox.className = 'show incorrect-fb';
      feedbackBox.textContent = '✗ No es la opción correcta. ' + q.explanation;
    }

    progressScore.textContent = score + ' pts';

    nextBtn.textContent = (currentIndex === questions.length - 1) ? 'Ver resultado' : 'Siguiente';
    nextBtn.classList.add('show');
  }

  nextBtn.addEventListener('click', () => {
    if(currentIndex < questions.length - 1){
      currentIndex++;
      renderQuestion();
    } else {
      progressFill.style.width = '100%';
      finishQuiz();
    }
  });

  // ---------- RESULT ----------
  const resultScreen = document.getElementById('result-screen');
  const resultTitle = document.getElementById('result-title');
  const resultSub = document.getElementById('result-sub-text');
  const statCorrect = document.getElementById('stat-correct');
  const statTime = document.getElementById('stat-time');
  const scoreValue = document.getElementById('score-value');
  const continueBtn = document.getElementById('continue-btn');

  function finishQuiz(){
    if(finished) return;
    finished = true;
    clearInterval(timerInterval);

    const finalScore = Math.min(score, MAX_SCORE);

    if(correctCount === questions.length){
      resultTitle.textContent = 'SUBPROBLEMA IDENTIFICADO';
      resultSub.textContent = 'Comprendiste cómo se conectan las fases de descomposición de un problema. ¡Análisis perfecto!';
    } else if(correctCount >= questions.length / 2){
      resultTitle.textContent = 'ANÁLISIS COMPLETO';
      resultSub.textContent = 'Buen trabajo identificando cómo se relacionan los subproblemas. Respondiste ' + correctCount + ' de ' + questions.length + ' correctamente.';
    } else {
      resultTitle.textContent = 'ANÁLISIS INCOMPLETO';
      resultSub.textContent = 'Conviene repasar cómo se conectan las subtareas al descomponer un problema. Respondiste ' + correctCount + ' de ' + questions.length + ' correctamente.';
    }

    statCorrect.textContent = correctCount + '/' + questions.length;
    statTime.textContent = formatTime(elapsedSeconds);
    scoreValue.textContent = finalScore;

    resultScreen.classList.add('show');

    // Enviar resultado a Unity
    if (window.parent.unityInstance) {
      try {
        window.parent.unityInstance.SendMessage('MinijuegoManager', 'RecibirResultadoMinijuego', String(finalScore));
      } catch (e) {}
    }
  }

  continueBtn.addEventListener('click', () => {
    if (window.parent.unityInstance) {
      try {
        window.parent.unityInstance.SendMessage('MinijuegoManager', 'CerrarMinijuego', '');
      } catch (e) {}
    }
  });

  // ---------- INIT ----------
  function init(){
    renderQuestion();
    startElapsedTimer();
  }

  init();

})();
</script>

</body>
</html>
